<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 220px;
      background: #0e0e0f;
      color: #e8e8ea;
      font-family: 'Syne', sans-serif;
      padding: 16px;
    }
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700&display=swap');
    .logo { color: #ff4d00; font-size: 18px; }
    h1 { font-size: 15px; font-weight: 700; margin-top: 6px; }
    p { font-size: 11px; color: #555; margin-top: 6px; line-height: 1.5; }
    button {
      margin-top: 14px;
      width: 100%;
      background: #ff4d00;
      color: #fff;
      border: none;
      padding: 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: background 0.15s;
    }
    button:hover { background: #ff6020; }
    .hint {
      margin-top: 10px;
      font-size: 10px;
      color: #333;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="logo">▶</div>
  <h1>VideoRail</h1>
  <p>Scan the page for videos and open the sidebar panel.</p>
  <button id="toggle">Toggle Sidebar</button>
  <p class="hint">Supports HTML5, YouTube, Vimeo, Loom & more</p>
  <script src="popup.js"></script>
</body>
</html>

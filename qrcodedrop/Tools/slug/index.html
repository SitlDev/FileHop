<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Generate URL-friendly slugs from text. Perfect for SEO optimization, blogging, and web development." />
  <meta name="keywords" content="slug generator, URL slug generator, URL friendly text, slug creator, SEO tool, URL optimization, web development, content management" />
  <link rel="stylesheet" href="../../style.css">
  <title>Slug Generator</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
</head>
<body>
  <div id="app">
    <header>
      <h1>Slug Generator</h1>
      <p>Convert text to URL-friendly slugs for web addresses and identifiers.</p>
    </header>

    <main>
      <section class="input-section">
        <h2>Input</h2>
        <textarea id="slug-input" rows="4" placeholder="Enter text to convert..." style="width:100%; padding:12px;"></textarea>

        <div class="form-container" style="margin-top:12px;">
          <label><input id="slug-lowercase" type="checkbox" checked> Convert to lowercase</label>
        </div>
        <div class="form-container">
          <label><input id="slug-spaces" type="checkbox" checked> Replace spaces with hyphens</label>
        </div>
        <div class="form-container">
          <label><input id="slug-special" type="checkbox" checked> Remove special characters</label>
        </div>

        <div class="actions" style="margin-top:12px;">
          <button id="btn-generate-slug">Generate Slug</button>
          <button id="btn-copy-slug">Copy</button>
        </div>
      </section>

      <section class="preview-section">
        <h2>Generated Slug</h2>
        <input id="slug-output" readonly style="width:100%; padding:12px; font-family: monospace;">
      </section>
    </main>

    <!-- Email Collection Modal -->
    <div id="email-modal" class="modal">
      <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h3>Get more productivity tools</h3>
        <p>Subscribe to receive new tool updates and tips.</p>
        <form id="email-signup-form">
          <input type="email" id="signup-email" placeholder="Email address" required>
          <button type="submit" class="signup-btn">Subscribe</button>
        </form>
      </div>
    </div>

    <footer>
      <p>&copy; 2026 Slug Generator</p>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
